<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>betterflyuu - Links</title>
    
    <style>
        /* 1. Latar Belakang Gradient Animasi (UIGradient + TweenService versi Web) */
        body {
            /* Ini UIGradient 3 warnanya */
            background: linear-gradient(-45deg, #2a3d35, #45f890, #caf39a, #75f7e1);
            
            /* Kita perbesar ukuran backgroundnya jadi 400% supaya bisa digeser-geser */
            background-size: 400% 400%;
            
            /* Ini perintah untuk menjalankan animasi bernama 'mengalir' selama 10 detik, berulang terus (infinite) */
            animation: mengalir 10s ease infinite;
            
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 50px;
            margin: 0; /* Menghilangkan jarak bawaan browser di pinggir layar */
            min-height: 100vh; /* Memastikan background memenuhi tinggi layar full */
        }

        /* Ini adalah 'Keyframes', tempat kita mengatur titik awal dan akhir animasi backgroundnya */
        @keyframes mengalir {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 2. Tempat Foto Profil */
       .profile-pic {
            width: 120px;
            height: 120px;
            /* Hapus background-color, ganti dengan background-image */
            background-image: url('profil.jpg.jpeg'); 
            background-size: cover; /* Memastikan foto memenuhi lingkaran tanpa gepeng */
            background-position: center; /* Memastikan foto berada di tengah */
            
            border-radius: 50%; 
            margin: 0 auto 15px auto;
            border: 3px solid #00ffcc; 
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.5);
        }

        /* 3. Desain Tombol Link */
        .link-button {
            display: block; 
            width: 80%;
            max-width: 350px; 
            margin: 15px auto; 
            padding: 15px;
            /* Latar belakang tombol dibuat agak transparan ala glassmorphism */
            background-color: rgba(30, 30, 47, 0.7); 
            backdrop-filter: blur(5px); /* Efek kaca buram premium */
            color: white;
            text-decoration: none; 
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            border: 1px solid #00ffcc;
            transition: 0.4s;
        }

        /* 4. Efek Hover Tombol */
        .link-button:hover {
            background-color: #00ffcc;
            color: black;
            box-shadow: 0 0 20px #00ffcc;
            transform: scale(1.05); /* Efek tombol membesar sedikit saat disorot */
        }
    </style>
</head>
<body>

    <div class="profile-pic"></div>
    <h2>betterflyuu</h2>
    <p>Story-driven Gaming Content Creator 🎮</p>

    <a href="https://www.youtube.com/@betterflyu" target="_blank" class="link-button">YouTube Channel</a>
    
    <a href="https://discord.gg/FPxVYTH4N" target="_blank" class="link-button">discord</a>
    
    <a href="https://saweria.co/betterflyuu" target="_blank" class="link-button">Support via Saweria ☕</a>

</body>
</html>
